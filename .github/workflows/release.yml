name: release

on:
  push:
    tags:
    - "[0-9]+.[0-9]+.[0-9]+"

  workflow_dispatch:
    inputs:
      tags:
        description: 'Tag to run the workflow on'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Get the release version from the tag
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          version="${{ github.event.inputs.tags }}"
        elif [ "${{ github.event_name }}" == "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
          version="${{ github.ref_name }}"
        else
          version="$(grep -m1 -E "^version[[:space:]]*=[[:space:]]*\"[^\"]+\"" Cargo.toml | sed -E 's/^version[[:space:]]*=[[:space:]]*\"([^"]+)\"/\1/' | tr -d '\r')"
          if [ -z "$version" ]; then
            echo "Failed to extract version from Cargo.toml" 1>&2
            exit 1
          fi
        fi
        echo "VERSION=$version" >> $GITHUB_ENV

    - name: Show the version
      run: echo "version is $VERSION"

    - name: Check that tag version and Cargo.toml version are the same
      shell: bash
      run: |
        if ! grep -q -E "^version[[:space:]]*=[[:space:]]*\"$VERSION\"" Cargo.toml; then
          echo "version does not match Cargo.toml" >&2
          exit 1
        fi

    - name: Create GitHub release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release create $VERSION --draft --verify-tag --title $VERSION

    outputs:
      version: ${{ env.VERSION }}

  build-release:
    name: build-release-${{ matrix.build }}
    needs: [ create-release ]
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: false
      matrix:
        include:
        - build: client-win-msvc
          crate: client
          package: dnf-client
          bin: dnf-launcher
          os: windows-latest
          rust: stable
          target: x86_64-pc-windows-msvc
          hook_target: i686-pc-windows-msvc

        - build: client-win-gnu
          crate: client
          package: dnf-client
          bin: dnf-launcher
          os: windows-latest
          rust: stable-x86_64-gnu
          target: x86_64-pc-windows-gnu
          hook_target: i686-pc-windows-gnu

        - build: server-linux-gnu
          crate: server
          package: dnf-gate-server
          bin: dnf-gate-server
          os: ubuntu-latest
          rust: stable
          target: x86_64-unknown-linux-gnu

        - build: server-linux-musl
          crate: server
          package: dnf-gate-server
          bin: dnf-gate-server
          os: ubuntu-latest
          rust: stable
          target: x86_64-unknown-linux-musl
          use_cross: true

        - build: server-linux-aarch64-gnu
          crate: server
          package: dnf-gate-server
          bin: dnf-gate-server
          os: ubuntu-24.04-arm
          rust: stable
          target: aarch64-unknown-linux-gnu

        - build: server-linux-aarch64-musl
          crate: server
          package: dnf-gate-server
          bin: dnf-gate-server
          os: ubuntu-24.04-arm
          rust: stable
          target: aarch64-unknown-linux-musl
          docker_image: clux/muslrust:stable

        - build: server-win-msvc
          crate: server
          package: dnf-gate-server
          bin: dnf-gate-server
          os: windows-latest
          rust: stable
          target: x86_64-pc-windows-msvc

        - build: server-win-gnu
          crate: server
          package: dnf-gate-server
          bin: dnf-gate-server
          os: windows-latest
          rust: stable-x86_64-gnu
          target: x86_64-pc-windows-gnu

        - build: ijl15-hook-win-msvc
          crate: ijl15-hook
          package: ijl15-hook
          bin: ijl15
          archive_name: ijl15-hook
          ext: .dll
          os: windows-latest
          rust: stable
          target: i686-pc-windows-msvc

        - build: ijl15-hook-win-gnu
          crate: ijl15-hook
          package: ijl15-hook
          bin: ijl15
          archive_name: ijl15-hook
          ext: .dll
          os: windows-latest
          rust: stable-i686-gnu
          target: i686-pc-windows-gnu

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        target: ${{ matrix.target }}

    - name: Install cross
      if: matrix.use_cross
      uses: taiki-e/install-action@v2
      with:
        tool: cross

    - name: Install i686 MinGW toolchain
      if: matrix.target == 'i686-pc-windows-gnu' || matrix.hook_target == 'i686-pc-windows-gnu'
      shell: bash
      run: |
        /c/msys64/usr/bin/pacman.exe -S --noconfirm mingw-w64-i686-gcc
        echo "/c/msys64/mingw32/bin" >> $GITHUB_PATH

    - name: Install hook target
      if: matrix.hook_target
      shell: bash
      run: rustup target add ${{ matrix.hook_target }}

    - name: Cache Cargo registry
      uses: actions/cache@v5
      with:
        path: ~/.cargo/registry/index
        key: release-${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          release-${{ runner.os }}-${{ matrix.target }}-cargo-registry-
          ${{ runner.os }}-${{ matrix.target }}-cargo-registry-

    - name: Cache Cargo registry cache
      uses: actions/cache@v5
      with:
        path: ~/.cargo/registry/cache
        key: release-${{ runner.os }}-${{ matrix.target }}-cargo-cache-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          release-${{ runner.os }}-${{ matrix.target }}-cargo-cache-
          ${{ runner.os }}-${{ matrix.target }}-cargo-cache-

    - name: Cache Cargo git dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cargo/git
        key: release-${{ runner.os }}-${{ matrix.target }}-cargo-git-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          release-${{ runner.os }}-${{ matrix.target }}-cargo-git-
          ${{ runner.os }}-${{ matrix.target }}-cargo-git-

    - name: Cache Cargo build
      uses: actions/cache@v5
      with:
        path: target
        key: release-${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
        restore-keys: |
          release-${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('Cargo.lock') }}-
          release-${{ runner.os }}-${{ matrix.target }}-cargo-build-
          ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('Cargo.lock') }}-

    - name: Build release binary
      shell: bash
      run: |
        if [ -n "${{ matrix.docker_image }}" ]; then
          docker run --rm \
            -v "$(pwd)":/volume \
            -w /volume \
            "${{ matrix.docker_image }}" \
            cargo build --release --target ${{ matrix.target }} -p ${{ matrix.package }}
        else
          cmd="${{ matrix.use_cross && 'cross' || 'cargo' }}"
          $cmd build --release --target ${{ matrix.target }} -p ${{ matrix.package }}
        fi
        bin="target/${{ matrix.target }}/release/${{ matrix.bin }}"
        if [ -n "${{ matrix.ext }}" ]; then
          bin="${bin}${{ matrix.ext }}"
        elif [[ "${{ matrix.target }}" == *"windows"* ]]; then
          bin="${bin}.exe"
        fi
        ls -lh "$bin"
        echo "BIN=$bin" >> $GITHUB_ENV

    - name: Build ijl15-hook
      if: matrix.hook_target
      shell: bash
      run: |
        cargo build --release --target ${{ matrix.hook_target }} -p ijl15-hook
        ls -lh "target/${{ matrix.hook_target }}/release/ijl15.dll"

    - name: Determine archive name
      shell: bash
      run: |
        version="${{ needs.create-release.outputs.version }}"
        name="${{ matrix.archive_name || matrix.bin }}"
        echo "ARCHIVE=${name}-${version}-${{ matrix.target }}" >> $GITHUB_ENV

    - name: Create archive directory
      shell: bash
      run: |
        mkdir -p "$ARCHIVE"
        cp "$BIN" "$ARCHIVE"/
        cp README.md "$ARCHIVE"/
        if [ "${{ matrix.crate }}" == "client" ]; then
          cp client/Config.example.toml "$ARCHIVE"/
          if [ -n "${{ matrix.hook_target }}" ]; then
            cp "target/${{ matrix.hook_target }}/release/ijl15.dll" "$ARCHIVE"/
          fi
        elif [ "${{ matrix.crate }}" == "ijl15-hook" ]; then
          cp ijl15-hook/GameServerIP.example.toml "$ARCHIVE"/
        else
          cp server/.env.example "$ARCHIVE"/
        fi

    - name: Build archive
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          7z a -tzip -mx=9 "$ARCHIVE.zip" "$ARCHIVE"
          certutil -hashfile "$ARCHIVE.zip" SHA256 > "$ARCHIVE.zip.sha256"
          asset="$ARCHIVE.zip"
        else
          tar -czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          sha256sum "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"
          asset="$ARCHIVE.tar.gz"
        fi
        ls -lh "$asset"
        echo "ASSET=$asset" >> $GITHUB_ENV
        echo "ASSET_SUM=$asset.sha256" >> $GITHUB_ENV

    - name: Upload release archive
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        version="${{ needs.create-release.outputs.version }}"
        gh release upload "$version" ${{ env.ASSET }} ${{ env.ASSET_SUM }}
