# DNF Launcher configuration example.
# Copy this file to Config.toml in the same directory as the launcher executable.

# Server address. Supports HTTP and HTTPS.
# Contact the server administrator for the connection address.
# Example: "http://192.168.200.131:5505"
server_url = "http://192.168.200.131:5505"

# AES encryption key shared with the server.
# Must be exactly 64 hexadecimal characters (32 bytes).
# Contact the server administrator for the correct key.
aes_key = "a1b2c3d4e5f6789012345678901234567890abcdef0123456789abcdef012345"

# Display language.
# Accepted values: "English", "ZhCn", "ZhTw", "Ja", "Ko"
language = "ZhCn"

# Directory scanned for JPG background images.
# Path is relative to the launcher executable.
bg_custom_path = "assets/bg"

# When true, custom background images are listed before the built-in set.
bg_custom_prepend = false

# Background image scaling mode.
# Accepted values: "Fill", "Fit", "Stretch", "Tile", "Center"
#   Fill    — scale uniformly to cover the window, then center-crop
#   Fit     — scale uniformly to fit within the window, letterboxing the remainder
#   Stretch — stretch to fill the window, ignoring aspect ratio
#   Tile    — repeat at original size without scaling
#   Center  — display at original size, centered
bg_fill_mode = "Fill"

# Directory scanned for 32-bit DLL files to inject into DNF.exe at launch.
# Path is relative to the launcher executable.
plugins_dir = "plugins"

# When false, the DLL injection step is skipped.
plugin_inject_enabled = true
